<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Imagens/FlyFeet.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Produto - FlyFeet</title>
</head>
<body>
    <header>
        <h1>Detalhes do Produto</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="destaques.html">Destaques</a>
            <a href="carrinho.html">Carrinho</a>
            <a href="curtidos.html">Curtidos</a>
        </nav>
    </header>

    <main id="produtoContainer" class="produto-detalhe"></main>

    <script>
        const produto = JSON.parse(localStorage.getItem("produtoSelecionado"));

        if (produto) {
            const container = document.getElementById("produtoContainer");
            container.innerHTML = `
                <div class="produto-info">
                    <img src="${produto.imagem}" alt="${produto.nome}">
                    <div class="info">
                        <h2>${produto.nome}</h2>
                        <p><strong>${produto.preco}</strong></p>
                        <p>${gerarDescricao(produto.nome)}</p>
                        <button onclick="comprarProduto()">Comprar</button>
                    </div>
                </div>
            `;
        }

        function gerarDescricao(nome) {
            const textos = {
                "Fly Sneak Shoes": "O Fly Sneak Shoes combina conforto e estilo urbano, ideal para quem busca leveza no dia a dia.",
                "Fly Rainbow PRO": "O Fly Rainbow PRO oferece performance e cor vibrante, perfeito para treinos intensos e visuais marcantes.",
                "Urban Max": "O Urban Max traz design moderno e solado firme, ideal para caminhadas longas e conforto prolongado.",
                "Soft Breeze": "O Soft Breeze é leve, respirável e macio — ideal para dias corridos e momentos de lazer."
            };
            return textos[nome] || "Modelo exclusivo FlyFeet, desenvolvido para conforto e performance.";
        }

        function comprarProduto() {
            alert("Compra realizada com sucesso!");
        }
    </script>
</body>
</html>
